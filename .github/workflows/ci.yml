name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Run tests
        run: node --test
      - name: Smoke generate-icons
        run: node scripts/generate-icons.mjs --out /tmp/ci-icons
